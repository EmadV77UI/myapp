name: Build iOS IPA

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: List files (debug)
        run: ls -la

      - name: Build iOS app
        run: |
          xcodebuild -project EABVFX.xcodeproj \
            -scheme EABVFX \
            -sdk iphoneos \
            -configuration Release \
            -allowProvisioningUpdates \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            ONLY_ACTIVE_ARCH=NO \
            build

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Release-iphoneos/EABVFX.app Payload/
          zip -r EABVFX.ipa Payload/

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: EABVFX.ipa
          path: EABVFX.ipa
